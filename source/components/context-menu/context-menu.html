<!-- Context Menu Component Template -->
<div class="context-menu" id="contextMenu">
  <div class="context-menu-item" data-action="duplicate">
    <i class="fas fa-copy" aria-hidden="true"></i> Duplicate
  </div>
  <div class="context-menu-item" data-action="delete">
    <i class="fas fa-trash" aria-hidden="true"></i> Delete
  </div>
  <div class="context-menu-separator"></div>
  <div class="context-menu-item" data-action="moveToFront">
    <i class="fas fa-bring-forward" aria-hidden="true"></i> Bring to Front
  </div>
  <div class="context-menu-item" data-action="moveToBack">
    <i class="fas fa-send-backward" aria-hidden="true"></i> Send to Back
  </div>
  <div class="context-menu-separator"></div>
  <div class="context-menu-item" data-action="resetSize">
    <i class="fas fa-sync" aria-hidden="true"></i> Reset Size
  </div>
  <div class="context-menu-item" data-action="centerAlign">
    <i class="fas fa-align-center" aria-hidden="true"></i> Center Align
  </div>
</div>
